name: Weekly Phone Bot

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Run phone bot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MOBILE_API_KEY: ${{ secrets.MOBILE_API_KEY }}
        run: pnpm tsx server/bot/run-bot.ts
